# Render Blueprint — defines all services for one-click deploy.
# Docs: https://render.com/docs/blueprint-spec
#
# What changed from the original 
# • Workers:   3 → 1   (free tier has 512 MB RAM; 3 workers OOM-killed)
services:
  - type: web
    name: planforge
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn planforge.wsgi:application --workers 1 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: planforge.settings.prod
      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        value: planforge.onrender.com   # replace with your actual Render domain

      - key: RENDER_EXTERNAL_HOSTNAME
        value: planforge.onrender.com   # replace with your actual Render domain

      # Supabase connection (Session Pooler) 
      # Find these in: Supabase dashboard → Settings → Database →
      # "Connection string" tab → choose "Session pooler"
      #
      #   DB_HOST format:  aws-0-<region>.pooler.supabase.com
      #   DB_USER format:  postgres.<project-ref>
      #   DB_PORT:         5432  (NOT 6543 — that's the transaction pooler,
      #                           which breaks Django's prepared statements)
      - key: DB_HOST
        sync: false   # set manually from Supabase Session Pooler

      - key: DB_PORT
        value: "5432"

      - key: DB_NAME
        value: postgres

      - key: DB_USER
        sync: false   # postgres.<project-ref>

      - key: DB_PASSWORD
        sync: false   # your Supabase database password

      - key: REDIS_URL
        sync: false   # set manually from Upstash — never commit this value

      - key: RESEND_API_KEY
        sync: false   # set manually

      - key: RESEND_FROM_EMAIL
        sync: false   # e.g. noreply@yourdomain.com

      - key: CLOUDINARY_URL
        sync: false   # cloudinary://key:secret@cloudname

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false
